databases:
  - name: smed-db
    plan: free
    region: singapore
    databaseName: smed
    postgresMajorVersion: 16

services:
  - type: web
    name: smed-changeover-manager
    env: node
    region: singapore
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smed-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
